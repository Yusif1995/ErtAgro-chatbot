services:
  - type: web
    name: ertagro-api
    env: python
    region: frankfurt
    plan: free
    pythonVersion: "3.11"
    buildCommand: bash build.sh
    startCommand: python -m uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TENANT_ID
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-10-21"
      - key: DATASETS_JSON
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
